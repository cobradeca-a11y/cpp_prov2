services:
  - type: web
    name: cpp-pro-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: OCR_ENGINE
        value: tesseract
      - key: AUDIVERIS_CMD
        value: audiveris
      - key: CPP_BACKEND_HOST
        value: 0.0.0.0
      - key: CPP_BACKEND_PORT
        value: "8787"
    healthCheckPath: /health
    autoDeploy: true
